<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Inspector</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
      background: #f4f4f4;
      width: 420px;
      max-height: 560px;
      overflow: auto;
    }

    h2 { margin: 0 0 10px 0; font-size: 16px; }

    .summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 10px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      padding: 6px 10px;
      font-size: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: white;
      background: #007bff;
    }

    button:hover { background: #0056b3; }

    .active-filter {
      outline: 2px solid #004a99;
      box-shadow: 0 0 0 2px rgba(0, 74, 153, 0.15);
    }

    #exportCsvBtn { background: #28a745; }
    #exportCsvBtn:hover { background: #218838; }

    #exportTxtBtn { background: #6f42c1; }
    #exportTxtBtn:hover { background: #59359a; }

    #copyAllBtn { background: #fd7e14; }
    #copyAllBtn:hover { background: #cc650f; }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      margin-bottom: 8px;
      background: white;
      border-radius: 4px;
      padding: 6px;
      border: 1px solid #e6e6e6;
    }

    li.external-link {
      background: #fff4e5;
      border-color: #ffd8a8;
    }

    .row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .link-text {
      color: #0b63c4;
      text-decoration: none;
      flex: 1;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .copy-btn {
      min-width: 28px;
      width: 28px;
      height: 24px;
      background: #444;
      font-size: 12px;
      line-height: 1;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
    }

    .copy-btn:hover { background: #222; }

    .sort-label {
      font-size: 12px;
      color: #333;
    }

    #sortMode {
      font-size: 12px;
      padding: 4px 6px;
      border: 1px solid #cfcfcf;
      border-radius: 4px;
      background: #fff;
    }

    li.risky-link {
      background: #fff;
      border-color: #e6e6e6;
    }

    .bucket-heading {
      margin: 8px 0 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      font-weight: 700;
    }

    .risky-heading {
      color: #ef4444;
    }

    .risk-groups {
      display: grid;
      gap: 8px;
      margin-top: 4px;
    }

    .risk-group {
      border: 1px solid #e6e6e6;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .risk-summary {
      list-style: none;
      cursor: pointer;
      padding: 7px 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .risk-summary::-webkit-details-marker { display: none; }

    .risk-summary-left {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow: hidden;
    }

    .risk-summary-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .risk-summary-catastrophic { color: #ef4444; }
    .risk-summary-technical { color: #f59e0b; }

    .info-dot {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      border: 1px solid currentColor;
      opacity: 0.9;
      flex: 0 0 auto;
    }

    .risk-list {
      margin: 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid #e8edf3;
    }

    .risk-row {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 8px;
      border-bottom: 1px solid #eef2f7;
      color: #243447;
    }

    .risk-row:last-child { border-bottom: 0; }
    .risk-row:hover { background: #f5f8fc; }

    .risk-url {
      color: #0b63c4;
      text-decoration: none;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      line-height: 1;
    }

    .meta {
      color: #666;
      font-size: 11px;
      margin-top: 6px;
    }

    .empty {
      color: #444;
      background: #fff;
      border: 1px dashed #ccc;
      padding: 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h2 id="title">Links on This Page</h2>

  <div id="summary" class="summary"></div>

  <div id="mainControls" class="controls">
    <button id="copyAllBtn">Copy Visible</button>
    <button id="exportTxtBtn">Export TXT</button>
    <button id="exportCsvBtn">Export CSV</button>
  </div>

  <div id="filterControls" class="controls filter-controls">
    <button data-filter="all" class="active-filter">All</button>
    <button data-filter="internal">Internal</button>
    <button data-filter="external">External</button>
    <button data-filter="risky">Risky</button>

    <label for="sortMode" class="sort-label">Sort:</label>
    <select id="sortMode">
      <option value="first">First seen</option>
      <option value="alphabetical">Alphabetical</option>
      <option value="domain">Domain</option>
      <option value="pathlen">Path length</option>
    </select>
  </div>

  <ul id="linkList"></ul>

  <script src="popup.js"></script>
</body>
</html>
